[vendor]
name = Raise3D
config_version = 1.0.0
config_update_url =


# =========================
# PRINTER MODELS
# =========================

[printer_model:RAISE3D_PRO2_PLUS]
name = Raise3D Pro2 Plus
variants = 0.4;0.6;0.8
technology = FFF
family = Raise3D
bed_model = pro2plus_bed.stl
#bed_texture = pro2plus_bed.svg
default_materials = RAISE_PLA;RAISE_PETG;RAISE_ABS;RAISE_TPU;RAISE_PVA;RAISE_NYLON;RAISE_PC;RAISE_ASA;RAISE_CF

[printer_model:RAISE3D_PRO3_PLUS]
name = Raise3D Pro3 Plus
variants = 0.4;0.6;0.8
technology = FFF
family = Raise3D
bed_model = pro3plus_bed.stl
#bed_texture = pro3plus_bed.svg
default_materials = RAISE_PLA;RAISE_PETG;RAISE_ABS;RAISE_TPU;RAISE_PVA;RAISE_NYLON;RAISE_PC;RAISE_ASA;RAISE_CF


# =========================
# COMMON PRINTER CORE
# =========================

[printer:*RAISE_COMMON*]
printer_technology = FFF
gcode_flavor = marlin2
use_relative_e_distances = 1
use_volumetric_e = 0
remaining_times = 1
silent_mode = 0
retract_speed = 40
deretract_speed = 40
retract_before_travel = 1.5
retract_lift = 0.4
wipe = 1
seam_position = aligned
z_offset = 0

start_gcode = G90\nM83\nG28\nM140 S{first_layer_bed_temperature[0]}\nM104 S{first_layer_temperature[0]}\nM190 S{first_layer_bed_temperature[0]}\nM109 S{first_layer_temperature[0]}
end_gcode = G1 Z{max_print_height} F600\nM104 S0\nM140 S0\nM84


# =========================
# PRO2 PLUS
# =========================

[printer:*PRO2PLUS*]
inherits = *RAISE_COMMON*
printer_model = RAISE3D_PRO2_PLUS
bed_shape = 0x0,305x0,305x305,0x305
max_print_height = 605
machine_max_feedrate_x = 300
machine_max_feedrate_y = 300
machine_max_feedrate_z = 20
machine_max_acceleration_x = 1000
machine_max_acceleration_y = 1000
machine_max_acceleration_z = 100
printer_notes = PRINTER_VENDOR_RAISE3D\nENCLOSED\nDUAL_EXTRUDER

[printer:Raise3D Pro2 Plus (0.4)]
inherits = *PRO2PLUS*
nozzle_diameter = 0.4
min_layer_height = 0.1
max_layer_height = 0.32

[printer:Raise3D Pro2 Plus (0.6)]
inherits = *PRO2PLUS*
nozzle_diameter = 0.6
min_layer_height = 0.15
max_layer_height = 0.4

[printer:Raise3D Pro2 Plus (0.8)]
inherits = *PRO2PLUS*
nozzle_diameter = 0.8
min_layer_height = 0.2
max_layer_height = 0.6



# Version: 1.0.0

[vendor]
name = DMAKERS
config_version = 0.0.1
config_update_url = https://files.prusa3d.com/wp-content/uploads/repository/PrusaSlicer-settings-master/live/Dmakers
#changelog_url = http://dmakers.local/changelog/
repo_id = non-prusa-fff


[printer_model:DMAKERS MS1]

start_gcode = G90 ; Use absolute coordinates\nM83 ; Extruder in relative mode\nM104 S[first_layer_temperature] ; Set extruder temp\nM140 S[first_layer_bed_temperature] ; Set bed temp\nM190 S[first_layer_bed_temperature] ; Wait for bed temp\nM109 S[first_layer_temperature] ; Wait for extruder temp\nG28 ; Home all axes\nG29 ; Bilinear mesh bed leveling\nM420 S1 ; Ensure leveling is active\nG1 X20 Y-3 F3000 ; Move just outside print area\nG1 Z0.2 E9 F500 ; Lower to starting Z height\nG92 E0 ; Reset extruder\nG1 X80 E12.5 F1000 ; Prime nozzle\nM420 S1 ; Enable leveling\nM221 S{if layer_height<0.075}100{else}95{endif} ; Flow tuning\n; M907 E1000 ; Optional motor current

end_gcode = ; === DMAKERS 3D Printer End G-code ===\nG91 ; Relative positioning\nG1 Z10 F500 ; Lift Z by 10mm to avoid scratches\nG90 ; Back to absolute positioning\nG1 X0 Y200 F3600 ; Park the nozzle (adjust if 200 is out of bounds)\nM221 S100 ; Reset flow rate\nM900 K0 ; Reset Linear Advance (only if enabled)\n;M907 E500 ; Optional: Reset extruder motor current (if supported)\nM104 S0 ; Turn off hotend\nM140 S0 ; Turn off heatbed\nM107 ; Turn off cooling fan\nM84 ; Disable all stepper motors\n;=== End of End G-code ===


# ─────────────── NOTES ───────────────

printer_notes = DMAKERS Professional Profile for Marlin-based printers\nIncludes optimized PLA, PETG, and ABS,TPU materials.\nDesigned for stable and high-quality prints.

